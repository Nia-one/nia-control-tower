<body class="bg-nia-wash text-nia-body min-h-screen flex flex-col antialiased">

<header class="bg-white border-t-4 border-t-nia-blue border-b border-nia-hair px-6 md:px-10 py-4 flex flex-col md:flex-row md:items-center justify-between gap-4 sticky top-0 z-30">
  <div class="flex items-center gap-4">
    <div class="flex items-center justify-center w-9 h-9 bg-nia-blue rounded-sm text-white">
      <i data-lucide="tower-control" class="w-6 h-6"></i>
    </div>
    <div>
      <h1 class="text-xl font-bold text-nia-ink tracking-tight flex items-center gap-2">
        Nia <span class="text-nia-hair font-light">|</span> <span class="text-nia-mute text-sm font-medium tracking-normal">Operations Control Tower</span>
      </h1>
    </div>
  </div>
  <div class="flex items-center gap-5 text-sm">
    <div class="flex items-center gap-2 font-medium bg-nia-panel px-3 py-1.5 rounded-full">
      <span class="relative flex h-2.5 w-2.5">
        <span id="dot-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75"></span>
        <span id="dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-nia-mute2"></span>
      </span>
      <span id="statusText" class="text-nia-body">Loading…</span>
    </div>
    <span class="text-nia-mute font-medium tabular-nums text-xs" id="countdown"></span>
    <button id="refreshBtn" class="bg-nia-blue hover:bg-nia-bluedeep text-white px-5 py-2 rounded-md text-sm font-semibold transition-colors flex items-center gap-2 shadow-sm">
      <i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh
    </button>
  </div>
</header>

<main class="flex-grow max-w-[1400px] mx-auto w-full min-w-0 px-4 md:px-10 py-10 space-y-12 overflow-x-hidden">
  <div id="banner"></div>
  <section id="behaviorBoard"></section>
  <div id="actionCenter" class="hidden">
    <h2 class="text-xs font-bold uppercase tracking-widest text-nia-clay mb-3 flex items-center gap-2">
      <i data-lucide="alert-triangle" class="w-4 h-4"></i> Action Required
    </h2>
    <div id="actionCards" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4"></div>
  </div>
  <section>
    <div class="flex items-end justify-between mb-6">
      <div>
        <h2 class="text-[11px] font-semibold uppercase tracking-widest text-nia-mute mb-1">Network At A Glance</h2>
        <h3 class="text-2xl md:text-3xl font-bold text-nia-ink tracking-tight">Four corridors, one view.</h3>
      </div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" id="summary"></div>
  </section>
  <section class="bg-nia-paper rounded-xl border border-nia-hair shadow-apple overflow-hidden min-w-0 max-w-full">
    <div class="px-4 md:px-8 pt-8 pb-4 border-b border-nia-hair bg-white min-w-0">
      <div class="flex flex-col md:flex-row md:items-end justify-between gap-6 mb-6 min-w-0">
        <div class="min-w-0">
          <h2 class="text-[11px] font-semibold uppercase tracking-widest text-nia-mute mb-1">The Detail</h2>
          <h3 class="text-2xl font-bold text-nia-ink tracking-tight">Deep dive by area</h3>
        </div>
      </div>
      <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 w-full max-w-full gap-1.5 bg-nia-panel p-1.5 rounded-lg" id="tabbar"></div>
    </div>
    <div class="p-4 md:p-8 bg-nia-paper min-w-0 max-w-full overflow-hidden">
      <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4 min-w-0">
        <div class="flex items-center gap-3 min-w-0">
          <span class="text-lg font-bold text-nia-ink" id="panelTitle"></span>
          <div id="tabmeta" class="flex items-center"></div>
        </div>
        <div id="detailHint" class="text-xs font-medium text-nia-mute flex items-center gap-1.5">
          <i data-lucide="layout-list" class="w-3.5 h-3.5"></i>
          Detail shown as readable action cards
        </div>

function refreshIcons(){
  if(window.lucide && typeof window.lucide.createIcons === "function") window.lucide.createIcons();

function tabIndexByLabel(label){ return CONFIG.tabs.findIndex(t=>t.label===label); }
function gvizUrl(tab){
  if (tab.csvUrl) return tab.csvUrl;
  return `https://docs.google.com/spreadsheets/d/${CONFIG.sheetId}/gviz/tq?tqx=out:csv&gid=${tab.gid}`;
}

function parseCSV(text){
  const rows=[]; let row=[], field="", q=false;
  for(let i=0;i<text.length;i++){
    const c=text[i];
    if(q){ if(c==='"'){ if(text[i+1]==='"'){field+='"';i++;} else q=false; } else field+=c; }
    else {
      if(c==='"') q=true;
      else if(c===','){ row.push(field); field=""; }
      else if(c==='\n'){ row.push(field); rows.push(row); row=[]; field=""; }
      else if(c==='\r'){}
      else field+=c;
    }
  }
  if(field.length||row.length){ row.push(field); rows.push(row); }
  const cleaned=rows.filter(r=>r.some(c=>String(c).trim()!==""));
  if(!cleaned.length) return {headers:[],rows:[]};
  return { headers: cleaned[0].map(h=>h.trim()), rows: cleaned.slice(1) };
}

async function loadTab(idx){
  const tab=CONFIG.tabs[idx];
  if(usingSample){
    const s=SAMPLE[tab.label]||{headers:[],rows:[]};
    state.data[idx]={...s, fetchedAt:new Date(), status:"sample"};
    return;
  }
  try{
    const res=await fetch(gvizUrl(tab), {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const txt=await res.text();
    const parsed=parseCSV(txt);
    if(!parsed.headers.length) throw new Error("empty");
    state.data[idx]={...parsed, fetchedAt:new Date(), status:"live"};
  }catch(e){
    const s=SAMPLE[tab.label]||{headers:[],rows:[]};
    state.data[idx]={...s, fetchedAt:new Date(), status:"error", error:String(e.message||e)};
  }
}

/* ---- aggregation ---- */
function colIndex(headers,name){ return headers.findIndex(h=>h.toLowerCase()===String(name).toLowerCase()); }
function toNum(v){ const n=parseFloat(String(v).replace(/[^0-9.\-]/g,"")); return isNaN(n)?null:n; }
function aggregateOn(tabIdx,k){
  const d=state.data[tabIdx]; if(!d) return null;
  const H=d.headers, R=d.rows;
  if(k.agg==="sum"){ const ci=colIndex(H,k.col); return R.reduce((a,r)=>a+(toNum(r[ci])||0),0); }
  if(k.agg==="avg"){ const ci=colIndex(H,k.col); const v=R.map(r=>toNum(r[ci])).filter(x=>x!=null); return v.length? v.reduce((a,b)=>a+b,0)/v.length:null; }
  if(k.agg==="max"){ const ci=colIndex(H,k.col); const v=R.map(r=>toNum(r[ci])).filter(x=>x!=null); return v.length? Math.max(...v):null; }
  if(k.agg==="ratio"){
    const ni=colIndex(H,k.num), di=colIndex(H,k.den);
    let n=0,dd=0;
    R.forEach(r=>{ const den=toNum(r[di]); if(den!=null && den!==0){ n+=(toNum(r[ni])||0); dd+=den; } });
    return dd? (n/dd)*100:null;
  }
  if(k.agg==="count"){ return R.length; }
  return null;
}
function inr(n){
  if(n==null) return "–";
  const neg=n<0; n=Math.abs(Math.round(n*100)/100);
  let [i,f]=String(n).split("."); let last3=i.slice(-3), rest=i.slice(0,-3);
  if(rest) last3=","+last3; rest=rest.replace(/\B(?=(\d{2})+(?!\d))/g,",");
  let out=rest+last3; if(f) out+="."+f; return (neg?"-":"")+out;
}
function fmt(v,f){ if(v==null) return "–"; if(f==="pct") return (Math.round(v*10)/10)+"%"; return inr(v); }
function clamp(n,min=0,max=100){ return Math.min(Math.max(n,min),max); }
function esc(v){ return String(v ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function readCol(data, names){
  for(const name of names){ const idx = colIndex(data.headers, name); if(idx >= 0) return idx; }
  return -1;
}
function sortedRows(data){
  const rows = data.rows.slice();
  const s = state.sort[state.active];
  if(!s) return rows;
  rows.sort((a,b)=>{
    const x=toNum(a[s.col]), y=toNum(b[s.col]);
    let cmp;
    if(x!=null && y!=null) cmp=x-y;
    else cmp=String(a[s.col] ?? "").localeCompare(String(b[s.col] ?? ""), undefined, {numeric:true, sensitivity:"base"});
    return s.dir==="asc" ? cmp : -cmp;
  });
  return rows;
}

function sparkline(points, target=null, tone="blue"){
  const vals=points.map(toNum).filter(v=>v!=null);
  if(!vals.length) return "";
  const max=Math.max(...vals, target!=null ? target : -Infinity);
  const min=Math.min(...vals, target!=null ? target : Infinity);
  const spread=max-min || 1;
  const w=260, h=76, pad=8;
  const xy=vals.map((v,i)=>{
    const x=pad + (vals.length===1 ? 0 : i*(w-pad*2)/(vals.length-1));
    const y=h-pad - ((v-min)/spread)*(h-pad*2);
    return [x,y];
  });
  const d=xy.map((p,i)=>`${i?"L":"M"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const targetY=target!=null ? h-pad - ((target-min)/spread)*(h-pad*2) : null;
  const color=tone==="red" ? "#B94A48" : "#003A70";
  return `<svg viewBox="0 0 ${w} ${h}" class="w-full h-20" role="img" aria-label="six week trend">
    <line x1="${pad}" y1="${h-pad}" x2="${w-pad}" y2="${h-pad}" stroke="#D0D0D0" stroke-width="1"/>
    ${targetY!=null ? `<line x1="${pad}" y1="${targetY.toFixed(1)}" x2="${w-pad}" y2="${targetY.toFixed(1)}" stroke="#888888" stroke-width="1" stroke-dasharray="4 4"/>` : ""}
    <path d="${d}" fill="none" stroke="${color}" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    ${xy.map(([x,y],i)=>`<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="${i===xy.length-1 ? 4 : 3}" fill="${color}" stroke="white" stroke-width="2"/>`).join("")}
  </svg>`;
}

/* ============================================================
   LIVE PRIORITY PROGRESS — parsed from Priorities sheet columns
   Expected columns: Priority | Progress | Current | Target | Gap | Risk | Insight | Behavior to drive
   Progress format:  "26% done / 74% left"
   Current format:   "910 live nests / 3,500 target"  (or any free text)
   Target format:    "3,500 nests"  or  "24 nests/day"  etc.
   Gap format:       "2,590 nests"  or  "1.74L CM gap"  etc.

   When the live Google Sheet is connected (CONFIG.sheetId replaced with real ID),
   renderBehaviorBoard() will read state.data[pIdx] instead of SAMPLE["Priorities"].
   The parser handles any reasonable column ordering via header name matching,
   with positional fallbacks so it degrades gracefully.
   ============================================================ */

function parseDonePct(progressStr, currentStr, targetStr) {
  // Primary: compute from current ÷ target (both extracted as first numeric token)
  function firstNum(s) {
    const m = String(s || "").split("/")[0].match(/[\d,]+(?:\.\d+)?/);
    return m ? parseFloat(m[0].replace(/,/g, "")) : null;
  }
  const cur = firstNum(currentStr);
  const tgt = firstNum(targetStr);
  if (cur != null && tgt != null && tgt > 0) {
    return Math.min(100, Math.round(cur / tgt * 1000) / 10);
  }
  // Fallback: parse "26% done / 74% left" from Progress column
  const m = String(progressStr || "").match(/(\d+(?:\.\d+)?)\s*%\s*done/i);
  return m ? parseFloat(m[1]) : 0;
}

function parseCurrentRate(currentStr) {
  // "910 live nests / 3,500 target"  →  "910 live nests"
  // Plain text with no slash  →  return as-is
  const s = String(currentStr || "");
  const slash = s.indexOf("/");
  return slash > 0 ? s.slice(0, slash).trim() : s.trim();
}

function parseAskRate(targetStr, currentStr, gapStr) {
  const t = String(targetStr || "").trim();

  // If Target already looks like a rate (/day, /week, L/day, etc.) use it directly
  if (t && /\/\s*(day|week|wk)/i.test(t)) return t;

  // Compute daily ask = gap / days remaining until June 30
  const gapRaw = String(gapStr || "");
  const gapNum = parseFloat(gapRaw.replace(/[^0-9.]/g, ""));
  if (!isNaN(gapNum) && gapNum > 0) {
    const today = new Date();
    const deadline = new Date(today.getFullYear(), 5, 30); // June = month 5
    const daysLeft = Math.max(1, Math.ceil((deadline - today) / 86400000));
    const daily = gapNum / daysLeft;

    if (/L\b|lakh/i.test(gapRaw)) {
      return (Math.round(daily * 100) / 100) + "L/day";
    } else if (/%/.test(gapRaw)) {
      return (Math.round(daily * 10) / 10) + "pts/day";
    } else {
      return Math.ceil(daily) + "/day";
    }
  }

  // Fallback: Target as-is, then after "/" in Current
  if (t && t !== "–") return t;
  const s = String(currentStr || "");
  const slash = s.indexOf("/");
  return slash >= 0 ? s.slice(slash + 1).trim() : "–";
}

function parseDriver(insightStr) {
  const s = String(insightStr || "");

  // 1. Visited count: "X,XXX nests ... Visited"
  const visitedM = s.match(/(\d[\d,]*)\s+(?:potential\s+)?nests[^;]*Visited/i)
                || s.match(/Visited[^;]*?(\d[\d,]*)\s+(?:are|nests)/i);
  if (visitedM) return "Visited: " + visitedM[1].replace(/,/g,"") + " nests";

  // 2. Named entity: "Munirappa: -80"
  const namedM = s.match(/([A-Z][a-z]+(?:\s[A-Z][a-z]+)?):\s*(-?\d[\d,.]*)/);
  if (namedM) return namedM[1] + ": " + namedM[2];

  // 3. Percentage achieved: "X% achieved"
  const achM = s.match(/(\d+(?:\.\d+)?%)\s+achieved/i);
  if (achM) return achM[1] + " achieved";

  // 4. Financial comparison: "X.XL vs Y.YL"
  const vsM = s.match(/(\d+(?:\.\d+)?L)\s+vs\s+(\d+(?:\.\d+)?L)/i);
  if (vsM) return vsM[1] + " vs " + vsM[2] + " target";

  // 5. First stat-led phrase: "X.XL [label]"
  const lakhM = s.match(/(\d+(?:\.\d+)?L)\s+([\w\s]{2,20})/i);
  if (lakhM) return (lakhM[1] + " " + lakhM[2]).trim().slice(0, 40);

  // 6. First clause before ";" capped at 40 chars
  const clause = s.split(";")[0].trim();
  return clause.length > 40 ? clause.slice(0, 37) + "\u2026" : clause;
}

/* ── LIVE card renderer ───────────────────────────────────────────
   r       = one row array from state.data[pIdx].rows
   headers = the sheet's headers array (used for safe column lookup)
   All display values are derived at render-time from live data.
   ──────────────────────────────────────────────────────────────── */
function progressPriorityCard(r, headers, liveContext) {
  // Header-safe column lookup with positional fallback
  const hi = (name, fallback) => {
    const idx = headers.findIndex(h => h.toLowerCase().trim() === name.toLowerCase());
    return idx >= 0 ? idx : fallback;
  };

  const priority    = r[hi("priority",    0)] || "–";
  const progressStr = r[hi("progress",    1)] || "";
  const currentStr  = r[hi("current",     2)] || "";
  const targetStr   = r[hi("target",      3)] || "";
  const gap         = r[hi("gap",         4)] || "–";
  const risk        = r[hi("risk",        5)] || "–";
  const insight     = r[hi("insight",     6)] || "";

  const done        = clamp(parseDonePct(progressStr, currentStr, targetStr));
  const left        = clamp(100 - done);
  const currentRate = parseCurrentRate(currentStr);
  const askRate     = parseAskRate(targetStr, currentStr, gap);
  const driver      = (liveContext && liveContext[priority]) || parseDriver(insight);
  const isCritical  = String(risk).toLowerCase().includes("critical");

  return `<button class="text-left bg-white border border-nia-hair rounded-lg p-5 shadow-subtle hover:border-nia-blue/50 transition-colors min-w-0" data-priority="${esc(priority)}">
    <div class="flex items-start justify-between gap-3 mb-4">

      </div>
      <span class="px-2.5 py-1 rounded-full border text-xs font-semibold shrink-0 ${getRiskBadgeClass(risk)}">${esc(risk)}</span>
    </div>
    <div class="mb-4">
      <div class="flex items-end justify-between gap-3 mb-2">
        <div>
          <div class="text-3xl font-bold ${isCritical ? "text-nia-clay" : "text-nia-ink"}">${left}%</div>
          <div class="text-[11px] uppercase tracking-widest text-nia-mute font-semibold">left</div>
        </div>
        <div class="text-right">
          <div class="text-sm font-bold text-nia-ink">${done}% done</div>
          <div class="text-xs text-nia-mute">${esc(gap)}</div>
        </div>
      </div>
      <div class="h-2 bg-nia-panel overflow-hidden">
        <div class="h-full ${isCritical ? "bg-nia-clay" : "bg-nia-blue"}" style="width:${done}%"></div>
      </div>
    </div>
    <div class="grid grid-cols-2 gap-2 mb-3 text-xs">
      <div class="bg-nia-wash rounded-md p-3 min-w-0">
        <div class="text-nia-mute font-medium mb-1">Current rate</div>
        <div class="text-nia-ink font-bold break-words">${esc(currentRate)}</div>
      </div>
      <div class="bg-nia-wash rounded-md p-3 min-w-0">
        <div class="text-nia-mute font-medium mb-1">Ask rate</div>
        <div class="text-nia-ink font-bold break-words">${esc(askRate)}</div>
      </div>
    </div>
    <div class="text-sm font-semibold text-nia-blue flex gap-2 leading-snug">
      <i data-lucide="sliders-horizontal" class="w-4 h-4 shrink-0 mt-0.5"></i>
      <span>Driver: ${esc(driver)}</span>
    </div>
  </button>`;
}

/* ── LIVE behavior board renderer ────────────────────────────────
   Reads from state.data[pIdx] (the Priorities sheet, gid 639449170).
   Falls back to SAMPLE["Priorities"] if the sheet hasn't loaded yet
   (e.g. first paint before fetch completes, or demo/sample mode).
   ──────────────────────────────────────────────────────────────── */
function renderBehaviorBoard() {
  const host = document.getElementById("behaviorBoard");
  const pIdx = tabIndexByLabel("Priorities");

  // Prefer live sheet data; fall back to embedded sample
  const d = (pIdx >= 0 && state.data[pIdx] && state.data[pIdx].rows && state.data[pIdx].rows.length)
    ? state.data[pIdx]
    : { headers: SAMPLE["Priorities"].headers, rows: SAMPLE["Priorities"].rows };

  const rows    = d.rows;
  const headers = d.headers;

  // Find Risk column by name, positional fallback to index 5
  const riskIdx = headers.findIndex(h => h.toLowerCase().trim() === "risk");
  const rIdx    = riskIdx >= 0 ? riskIdx : 5;

  const critical = rows.filter(r => String(r[rIdx] || "").toLowerCase().includes("critical")).length;

  // Build liveContext: keyed by priority name, value is the driver string sourced live from other tabs
  const liveContext = {};

  // FONO Visited count — from FONO tab, Stage="Visited", sum Potential Nests
  const fonoIdx = tabIndexByLabel("FONO");
  const fonoData = (fonoIdx >= 0 && state.data[fonoIdx] && state.data[fonoIdx].rows.length)
    ? state.data[fonoIdx]
    : { headers: SAMPLE["FONO"].headers, rows: SAMPLE["FONO"].rows };
  const fonoStageIdx = fonoData.headers.findIndex(h => h.toLowerCase().trim() === "stage");
  const fonoNestsIdx = fonoData.headers.findIndex(h => h.toLowerCase().trim() === "potential nests");
  if (fonoStageIdx >= 0 && fonoNestsIdx >= 0) {
    const visitedNests = fonoData.rows
      .filter(r => String(r[fonoStageIdx] || "").toLowerCase().trim() === "visited")
      .reduce((sum, r) => sum + (parseFloat(String(r[fonoNestsIdx]).replace(/,/g, "")) || 0), 0);
    if (visitedNests > 0) liveContext["Convert FONO funnel"] = "Visited: " + Math.round(visitedNests) + " nests";
  }

  // Collections top due — from Collections tab, highest Due (₹L) row
  const collIdx = tabIndexByLabel("Collections");
  const collData = (collIdx >= 0 && state.data[collIdx] && state.data[collIdx].rows.length)
    ? state.data[collIdx]
    : { headers: SAMPLE["Collections"].headers, rows: SAMPLE["Collections"].rows };
  const collDueIdx = collData.headers.findIndex(h => h.toLowerCase().trim() === "due (₹l)");
  const collStudioIdx = collData.headers.findIndex(h => h.toLowerCase().trim() === "studio");
  if (collDueIdx >= 0 && collStudioIdx >= 0) {
    const topRow = collData.rows.slice().sort((a, b) =>
      (parseFloat(String(b[collDueIdx]).replace(/,/g,"")) || 0) -
      (parseFloat(String(a[collDueIdx]).replace(/,/g,"")) || 0)
    )[0];
    if (topRow) {
      const studio = String(topRow[collStudioIdx] || "").split(" ").slice(-2).join(" ");
      liveContext["Recover collections"] = "Top due: " + topRow[collDueIdx] + "L";
    }
  }

  // Movement worst studio — from Movement tab, lowest Net 15d row
  const movIdx = tabIndexByLabel("Movement");
  const movData = (movIdx >= 0 && state.data[movIdx] && state.data[movIdx].rows.length)
    ? state.data[movIdx]
    : { headers: SAMPLE["Movement"].headers, rows: SAMPLE["Movement"].rows };
  const movNetIdx = movData.headers.findIndex(h => h.toLowerCase().trim() === "net 15d");
  const movStudioIdx = movData.headers.findIndex(h => h.toLowerCase().trim() === "studio");
  if (movNetIdx >= 0 && movStudioIdx >= 0) {
    const worstRow = movData.rows.slice().sort((a, b) =>
      (parseFloat(String(a[movNetIdx]).replace(/,/g,"")) || 0) -
      (parseFloat(String(b[movNetIdx]).replace(/,/g,"")) || 0)
    )[0];
    if (worstRow) {
      const studioName = String(worstRow[movStudioIdx] || "").replace("Nia Nest ", "");
      liveContext["Stop check-out leakage"] = studioName + ": " + worstRow[movNetIdx] + " net";
    }
  }

  // Wellington occupancy gap — from Studios tab
  const studIdx = tabIndexByLabel("Studios");
  const studData = (studIdx >= 0 && state.data[studIdx] && state.data[studIdx].rows.length)
    ? state.data[studIdx]
    : { headers: SAMPLE["Studios"].headers, rows: SAMPLE["Studios"].rows };
  const studTheatreIdx = studData.headers.findIndex(h => h.toLowerCase().trim() === "theatre");
  const studOccIdx = studData.headers.findIndex(h => h.toLowerCase().trim() === "occupancy %");
  const studContrIdx = studData.headers.findIndex(h => h.toLowerCase().trim() === "contracted");
  const studOccupIdx = studData.headers.findIndex(h => h.toLowerCase().trim() === "occupied");
  if (studTheatreIdx >= 0 && studOccIdx >= 0) {
    const wlgRow = studData.rows.find(r => String(r[studTheatreIdx] || "").toLowerCase().includes("wellington"));
    if (wlgRow && studContrIdx >= 0 && studOccupIdx >= 0) {
      const gap = (parseFloat(String(wlgRow[studContrIdx]).replace(/,/g,"")) || 0) -
                  (parseFloat(String(wlgRow[studOccupIdx]).replace(/,/g,"")) || 0);
      liveContext["Fix Wellington occupancy drag"] = "Wellington: " + Math.round(gap) + " nests gap";
    }
  }

  // Essentials attach — from Essentials tab, network-level attach%
  const essIdx = tabIndexByLabel("Essentials");
  const essData = (essIdx >= 0 && state.data[essIdx] && state.data[essIdx].rows.length)
    ? state.data[essIdx]
    : { headers: SAMPLE["Essentials"].headers, rows: SAMPLE["Essentials"].rows };
  const essStudRevIdx = essData.headers.findIndex(h => h.toLowerCase().trim() === "studio revenue (₹l)");
  const essEssRevIdx  = essData.headers.findIndex(h => h.toLowerCase().trim() === "essentials revenue (₹l)");
  if (essStudRevIdx >= 0 && essEssRevIdx >= 0) {
    const totStud = essData.rows.reduce((s,r) => s + (parseFloat(String(r[essStudRevIdx]).replace(/,/g,""))||0), 0);
    const totEss  = essData.rows.reduce((s,r) => s + (parseFloat(String(r[essEssRevIdx]).replace(/,/g,""))||0), 0);
    if (totStud > 0) {
      const attach = Math.round(totEss / totStud * 1000) / 10;
      liveContext["Monetise member wallet"] = attach + "% attach vs 3.9% target";
    }
  }

  // B2B: from CM Actions tab — B2B row Achievement%
  const cmIdx = tabIndexByLabel("CM Actions");
  const cmData = (cmIdx >= 0 && state.data[cmIdx] && state.data[cmIdx].rows.length)
    ? state.data[cmIdx]
    : { headers: SAMPLE["CM Actions"].headers, rows: SAMPLE["CM Actions"].rows };
  const cmDriverIdx = cmData.headers.findIndex(h => h.toLowerCase().trim() === "driver");
  const cmAchIdx    = cmData.headers.findIndex(h => h.toLowerCase().trim() === "achievement %");
  const cmGapIdx    = cmData.headers.findIndex(h => h.toLowerCase().trim() === "gap (₹l)");
  if (cmDriverIdx >= 0 && cmAchIdx >= 0) {
    const b2bRow = cmData.rows.find(r => String(r[cmDriverIdx] || "").toLowerCase().includes("b2b"));
    if (b2bRow) liveContext["Close B2B conversion"] = String(b2bRow[cmAchIdx] || "–") + "% achieved";
  }

  const cards = rows.map(r => progressPriorityCard(r, headers, liveContext)).join("");

  host.innerHTML = `<div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-5">
    <div>
      <h2 class="text-[11px] font-semibold uppercase tracking-widest text-nia-mute mb-1">Behavior War Room</h2>
      <h3 class="text-2xl md:text-3xl font-bold text-nia-ink tracking-tight">${critical} critical actions to manage daily.</h3>
    </div>
    <div class="text-sm text-nia-mute max-w-xl">Each card shows % left, current pace, required pace, and the variable driving the miss most. This should push behavior, not just report variance.</div>
  </div>
  <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-6 gap-4">${cards}</div>`;
}

/* ---- render UI ---- */
function setStatus(kind,text){
  const dot = document.getElementById("dot");
  const ping = document.getElementById("dot-ping");
  if(kind === 'live') {
    dot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-nia-blue";
    ping.className = "animate-ping absolute inline-flex h-full w-full rounded-full bg-nia-blue opacity-30";
  } else if (kind === 'error') {
    dot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-nia-clay";
    ping.className = "hidden";
  } else {
    dot.className = "relative inline-flex rounded-full h-2.5 w-2.5 bg-nia-mute2";
    ping.className = "hidden";
  }
  document.getElementById("statusText").textContent=text;
}

function trendMeta(k, isAlert){
  const dir=k.trend || (k.alertIfAbove!=null ? "down" : "up");
  const icon=dir==="down" ? "trending-down" : dir==="flat" ? "move-right" : "trending-up";
  const label=dir==="down" ? "Needs to move down" : dir==="flat" ? "Hold steady" : "Needs to move up";
  const tone=isAlert ? "text-nia-clay bg-[#F8ECEB] border-[#E8C8C6]" : "text-nia-blue bg-nia-panel border-nia-hair";
  return {dir, icon, label, tone};
}

function renderSummary(){
  const host=document.getElementById("summary"); host.innerHTML="";
  const actionCenter = document.getElementById("actionCenter");
  const actionCards = document.getElementById("actionCards");
  actionCards.innerHTML = "";
  let alertsCount = 0;

  (CONFIG.summary||[]).forEach((k)=>{
    const ti=tabIndexByLabel(k.tab);
    const val= k.agg==="static" ? k.value : (ti>=0 ? aggregateOn(ti,k) : null);
    let isAlert=false;
    if(k.alertIfAbove!=null && val!=null && val>k.alertIfAbove) isAlert=true;
    if(k.alertIfBelow!=null && val!=null && val<k.alertIfBelow) isAlert=true;
    if(k.target!=null && val!=null && val<k.target) isAlert=true;
    const trend=trendMeta(k, isAlert);

    const card=document.createElement("div");
    const canOpen = ti >= 0;
    card.className = `bg-white rounded-lg border ${isAlert ? 'border-nia-clay shadow-sm' : 'border-nia-hair shadow-subtle'} p-6 flex flex-col relative overflow-hidden group ${canOpen ? 'cursor-pointer hover:border-nia-blue/60 hover:shadow-apple transition-all' : ''}`;
    if(canOpen) {

      card.onclick = () => { state.active = ti; render(); document.querySelector('.tablewrap').scrollIntoView({behavior:'smooth',block:'center'}); };
      card.onkeydown = (e) => { if(e.key==="Enter"||e.key===" "){ e.preventDefault(); card.onclick(); } };
    }
    if(isAlert) card.innerHTML += `<div class="absolute top-0 left-0 right-0 h-1 bg-nia-clay"></div>`;

    let progressHtml = '';
    if(k.fmt === 'pct' && val != null) {
      const colorClass = isAlert ? 'bg-nia-clay' : 'bg-nia-blue';
      progressHtml = `<div class="w-full bg-nia-panel h-1.5 mt-5 overflow-hidden"><div class="${colorClass} h-1.5 transition-all duration-1000 ease-out" style="width:${clamp(val,0,100)}%"></div></div>`;
    }

      qualHtml = `<div class="text-xs font-medium text-nia-mute mt-3 flex justify-between items-center"><span>Target: <span class="text-nia-body font-semibold">${k.target}${k.fmt==="pct"?"%":""}</span></span><span class="inline-flex items-center gap-1 ${isAlert ? "text-nia-clay" : "text-nia-blue"}"><i data-lucide="${trend.icon}" class="w-4 h-4"></i> ${esc(trend.dir)}</span></div>`;
    } else {
      qualHtml = `<div class="text-xs font-medium text-nia-mute mt-3 flex justify-between items-center"><span>${esc(trend.label)}</span><span class="inline-flex items-center gap-1 ${isAlert ? "text-nia-clay" : "text-nia-blue"}"><i data-lucide="${trend.icon}" class="w-4 h-4"></i> ${esc(trend.dir)}</span></div>`;
    }
    card.innerHTML += `

        <span class="min-w-0 pr-3">${esc(k.label)}</span>
        <span class="inline-flex shrink-0 items-center justify-center w-8 h-8 rounded-sm border ${trend.tone}" title="${esc(trend.label)}"><i data-lucide="${trend.icon}" class="w-4 h-4"></i></span>
      </div>
      <div class="text-4xl font-bold tracking-tight ${isAlert ? 'text-nia-clay' : 'text-nia-ink'}">${fmt(val,k.fmt)}</div>
      ${progressHtml}${qualHtml}
      ${canOpen ? `<div class="mt-4 pt-4 border-t border-nia-hair text-xs font-bold text-nia-blue flex items-center justify-between gap-2"><span>Open ${esc(k.tab)}</span><i data-lucide="arrow-right" class="w-4 h-4 shrink-0"></i></div>` : ''}`;
    host.appendChild(card);

    if(isAlert && ti >= 0 && k.agg !== "static") {
      alertsCount++;
      const actionCard = document.createElement("div");
      actionCard.className = "bg-[#F8ECEB] border border-[#E8C8C6] rounded-lg p-4 cursor-pointer hover:bg-[#F4E2E0] transition-colors shadow-sm";
      actionCard.onclick = () => { if(ti >= 0) state.active = ti; render(); document.querySelector('.tablewrap').scrollIntoView({behavior:'smooth',block:'center'}); };
      let actionText = "";
      if(k.label.includes("Occupancy")) actionText = "Drive site-level demand generation.";
      else if(k.label.includes("Collections") || k.label.includes("Outstanding")) actionText = "Follow up on pending invoices.";
      else actionText = "Review pipeline blocks.";
      actionCard.innerHTML = `<div class="flex justify-between items-start mb-1"><div class="text-sm font-bold text-[#7F2F2D]">${k.label} Needs Action</div><i data-lucide="arrow-right-circle" class="w-4 h-4 text-nia-clay"></i></div><div class="text-xs text-[#7F2F2D] font-medium mb-2">Currently at ${fmt(val,k.fmt)}</div><div class="text-xs text-[#7F2F2D] bg-white/60 py-1 px-2 rounded-sm font-semibold inline-block">Action: ${actionText}</div>`;
      actionCards.appendChild(actionCard);
    }
  });
  if(alertsCount > 0) actionCenter.classList.remove('hidden');
  else actionCenter.classList.add('hidden');
}

    host.innerHTML=
      cockpitCard("Active Occupancy",fmt(totalContracted?totalOccupied/totalContracted*100:0,"pct"),barRows(rows.map(r=>({label:r[theatre],value:`${fmt(toNum(r[pct]),"pct")}`,width:toNum(r[pct])||0,alert:(toNum(r[pct])||0)<90}))),"building-2")+
      cockpitCard("CM Variance",`${inr(rows.reduce((a,r)=>a+(toNum(r[variance])||0),0))}L`,barRows(rows.map(r=>({label:r[theatre],value:`${inr(toNum(r[variance])||0)}L`,width:clamp(Math.abs(toNum(r[variance])||0)/(Math.max(...rows.map(x=>Math.abs(toNum(x[variance])||0)),1))*100),alert:(toNum(r[variance])||0)<0})),"red"),"line-chart")+
      cockpitCard("Focus Theatre",esc(worst?.[theatre]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">Wellington carries the largest active-theatre variance and lowest occupancy. Daily behavior: fill active beds before opening more supply.</div>`,"radar");
    return;
  }
  if(tab==="Drag Scores"){
    const entity=readCol(d,["Entity"]);const theatre=readCol(d,["Theatre"]);const score=readCol(d,["Drag Score"]);const primary=readCol(d,["Primary Drag"]);
    const top=rows.slice().sort((a,b)=>(toNum(b[score])||0)-(toNum(a[score])||0))[0];
    const byDriver={};rows.forEach(r=>{const key=r[primary]||"Other";byDriver[key]=(byDriver[key]||0)+1;});
    host.innerHTML=
      cockpitCard("Highest Drag Entity",esc(top?.[entity]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">${esc(top?.[theatre]||"")} · score ${esc(top?.[score]||"–")}.</div>`,"siren")+
      cockpitCard("Drag Mix",`${rows.length} entities`,barRows(Object.entries(byDriver).map(([label,value])=>({label,value:inr(value),width:clamp(value/rows.length*100),alert:label!=="Collections"})),"red"),"layers")+
      cockpitCard("Operating Rule","One owner",`<div class="text-sm text-nia-mute leading-relaxed">Every entity above 15 needs one owner, a clear action path, and a next review date. If the action is not fill, collect, retain, renegotiate, or exit, it is probably too vague.</div>`,"user-check");
    return;
  }
  if(tab==="Enterprise"){
    const workstream=readCol(d,["Workstream"]);const current=readCol(d,["Current"]);const target=readCol(d,["Target (₹L)"]);const realized=readCol(d,["Realized (₹L)"]);const ach=readCol(d,["Achievement %"]);
    const b2b=rows.find(r=>String(r[workstream]).includes("B2B"))||rows[0];
    const billingRows=rows.filter(r=>String(r[current]).includes("June billing")||String(r[current]).includes("estimated billing"));
    const maxBilling=Math.max(...billingRows.map(r=>toNum(r[realized])||0),1);
    host.innerHTML=
      cockpitCard("B2B Close Rate",fmt(toNum(b2b?.[ach])||0,"pct"),`<div class="h-2 bg-nia-panel rounded-full overflow-hidden mb-4"><div class="h-full bg-nia-clay rounded-full" style="width:${clamp(toNum(b2b?.[ach])||0)}%"></div></div><div class="text-sm text-nia-mute">${esc(b2b?.[4]||"1.74")}L CM gap against the June B2B target.</div>`,"briefcase-business")+
      cockpitCard("Enterprise Base","38.97L",barRows(billingRows.map(r=>({label:r[workstream],value:`${inr(toNum(r[realized])||0)}L`,width:clamp((toNum(r[realized])||0)/maxBilling*100)}))),"chart-column")+
      cockpitCard("Behavior Rule","Close Cadence",`<div class="text-sm text-nia-mute leading-relaxed">Enterprise should not be a passive billing report. Every account needs target nests, corridor, blocker, next meeting, and close date.</div>`,"calendar-check");
    return;
  }
  if(tab==="FONO Ease"){
    const prospect=readCol(d,["Prospect"]);const corridor=readCol(d,["Corridor"]);const nests=readCol(d,["Potential Nests"]);const ease=readCol(d,["Ease Score"]);const expected=readCol(d,["Expected Nests"]);
    const totalExpected=rows.reduce((a,r)=>a+(toNum(r[expected])||0),0);const totalPotential=rows.reduce((a,r)=>a+(toNum(r[nests])||0),0);
    const top=rows.slice().sort((a,b)=>(toNum(b[ease])||0)-(toNum(a[ease])||0))[0];
    const byCorridor={};rows.forEach(r=>{const key=r[corridor]||"Other";byCorridor[key]=(byCorridor[key]||0)+(toNum(r[expected])||0);});
    host.innerHTML=
      cockpitCard("Easy Expected Nests",inr(totalExpected),`<div class="h-2 bg-nia-panel rounded-full overflow-hidden mb-4"><div class="h-full bg-nia-blue rounded-full" style="width:${clamp(totalExpected/900*100)}%"></div></div><div class="text-sm text-nia-mute">Model-selected set covers ${inr(totalPotential)} potential nests and ${inr(totalExpected)} expected nests.</div>`,"gauge")+
      cockpitCard("Top Close",esc(top?.[prospect]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">${esc(top?.[corridor]||"")} · ease ${esc(top?.[ease]||"–")} · expected ${esc(top?.[expected]||"–")} nests.</div>`,"badge-check")+
      cockpitCard("Where To Push","Farukhnagar",barRows(Object.entries(byCorridor).map(([label,value])=>({label,value:inr(value),width:clamp(value/(totalExpected||1)*100)}))),"map-pin");
    return;
  }
  if(tab==="FONO"){
    const theatreCol=readCol(d,["Theatre"]);const corridorCol=readCol(d,["Corridor"]);const visitedCol=readCol(d,["Visited"]);const contractingCol=readCol(d,["Contracting"]);const liveCol=readCol(d,["Onboarded (Live)"]);const droppedCol=readCol(d,["Lost/Dropped"]);const totalCol=readCol(d,["Total Nests"]);
    const totalVisited=rows.reduce((a,r)=>a+(toNum(r[visitedCol])||0),0);const totalContracting=rows.reduce((a,r)=>a+(toNum(r[contractingCol])||0),0);const totalLive=rows.reduce((a,r)=>a+(toNum(r[liveCol])||0),0);const totalDropped=rows.reduce((a,r)=>a+(toNum(r[droppedCol])||0),0);const totalNests=rows.reduce((a,r)=>a+(toNum(r[totalCol])||0),0);
    host.innerHTML=
      cockpitCard("Live vs Target",inr(totalLive)+" / 3,500",'<div class="h-2 bg-nia-panel rounded-full overflow-hidden mb-4"><div class="h-full bg-nia-clay rounded-full" style="width:'+clamp(totalLive/3500*100)+'%"></div></div><div class="text-sm text-nia-mute">'+(3500-totalLive)+' nests still need to become live or equivalent CM impact.</div>',"flag")+
      cockpitCard("Stage Bottleneck",inr(totalVisited)+" visited",barRows([{label:"Visited",value:inr(totalVisited),width:clamp(totalVisited/totalNests*100),alert:true},{label:"Contracting",value:inr(totalContracting),width:clamp(totalContracting/totalNests*100),alert:totalContracting<50},{label:"Live",value:inr(totalLive),width:clamp(totalLive/totalNests*100)},{label:"Lost/Dropped",value:inr(totalDropped),width:clamp(totalDropped/totalNests*100),alert:totalDropped>200}],"red"),"funnel")+
      cockpitCard("Conversion Behavior","48h SLA",'<div class="text-sm text-nia-mute leading-relaxed">Visited owners are not progress until they move to contracting. Make every visit produce standard commercials, deposit ask, owner, and next date.</div>',"timer-reset");
    return;
  }
  if(tab==="Collections"){
    const studio=readCol(d,["Studio"]);const theatre=readCol(d,["Theatre"]);const due=readCol(d,["Due (₹L)"]);const pct=readCol(d,["Collection %"]);
    const totalDue=rows.reduce((a,r)=>a+(toNum(r[due])||0),0);const worst=rows.slice().sort((a,b)=>(toNum(b[due])||0)-(toNum(a[due])||0))[0];
    const byTheatre={};rows.forEach(r=>{const key=r[theatre]||"Other";byTheatre[key]=(byTheatre[key]||0)+(toNum(r[due])||0);});
    host.innerHTML=
      cockpitCard("Top Due Pool",`${inr(totalDue)}L`,barRows(Object.entries(byTheatre).sort((a,b)=>b[1]-a[1]).map(([label,value])=>({label,value:`${inr(value)}L`,width:clamp(value/(totalDue||1)*100),alert:value>2})),"red"),"hand-coins")+
      cockpitCard("Worst Studio",esc(worst?.[studio]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">${esc(worst?.[theatre]||"")} · due ${esc(worst?.[due]||"–")}L · collection ${esc(worst?.[pct]||"–")}%.</div>`,"alert-triangle")+
      cockpitCard("Score Rule","Due + pace",`<div class="text-sm text-nia-mute leading-relaxed">Collection score punishes large dues, zero recent member-fee pace, pending subhead, and review count.</div>`,"receipt-text");
    return;
  }
  if(tab==="Movement"){
    const studio=readCol(d,["Studio"]);const theatre=readCol(d,["Theatre"]);const ci=readCol(d,["Check-ins 15d"]);const co=readCol(d,["Check-outs 15d"]);const net=readCol(d,["Net 15d"]);
    const totalNet=rows.reduce((a,r)=>a+(toNum(r[net])||0),0);const worst=rows.slice().sort((a,b)=>(toNum(a[net])||0)-(toNum(b[net])||0))[0];
    host.innerHTML=
      cockpitCard("15d Net Movement",inr(totalNet),barRows(rows.slice(0,6).map(r=>({label:r[studio],value:inr(toNum(r[net])||0),width:clamp(Math.abs(toNum(r[net])||0)/80*100),alert:(toNum(r[net])||0)<0})),"red"),"door-open")+
      cockpitCard("Largest Leak",esc(worst?.[studio]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">${esc(worst?.[theatre]||"")} · ${esc(worst?.[ci]||"0")} check-ins / ${esc(worst?.[co]||"0")} check-outs.</div>`,"log-out")+
      cockpitCard("Behavior Rule","Retention before refill",`<div class="text-sm text-nia-mute leading-relaxed">If net movement is negative, first diagnose why people are leaving, then refill.</div>`,"shield-alert");
    return;
  }
  if(tab==="Studio Trends"){
    const studio=readCol(d,["Studio"]);const cm=readCol(d,["15d CM (₹L)"]);const delta=readCol(d,["Occ Delta"]);const score=readCol(d,["Trend Score"]);
    const worst=rows.slice().sort((a,b)=>(toNum(a[score])||0)-(toNum(b[score])||0))[0];
    host.innerHTML=
      cockpitCard("Worst Trend",esc(worst?.[studio]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">Trend score ${esc(worst?.[score]||"–")} · 15d CM ${esc(worst?.[cm]||"–")}L · occupancy delta ${esc(worst?.[delta]||"–")}.</div>`,"chart-no-axes-combined")+
      cockpitCard("15d CM Drag",`${inr(rows.reduce((a,r)=>a+Math.min(toNum(r[cm])||0,0),0))}L`,barRows(rows.slice(0,6).map(r=>({label:r[studio],value:`${esc(r[cm])}L`,width:clamp(Math.abs(toNum(r[cm])||0)/70.7*100),alert:(toNum(r[cm])||0)<0})),"red"),"line-chart")+
      cockpitCard("Decision Rule","Fill / collect / exit",`<div class="text-sm text-nia-mute leading-relaxed">The trend score exists to force a decision. Low score entities should not remain in a neutral monitoring state.</div>`,"split");
    return;
  }
  if(tab==="Essentials"){
    const theatre=readCol(d,["Theatre"]);const studioRev=readCol(d,["Studio Revenue (₹L)"]);const essentialsRev=readCol(d,["Essentials Revenue (₹L)"]);const attach=readCol(d,["Attach %"]);const members=readCol(d,["Members"]);
    const totalStudio=rows.reduce((a,r)=>a+(toNum(r[studioRev])||0),0);const totalEss=rows.reduce((a,r)=>a+(toNum(r[essentialsRev])||0),0);
    const best=rows.slice().sort((a,b)=>(toNum(b[attach])||0)-(toNum(a[attach])||0))[0];
    host.innerHTML=
      cockpitCard("Wallet Attach",fmt(totalStudio?totalEss/totalStudio*100:0,"pct"),barRows(rows.map(r=>({label:r[theatre],value:`${fmt(toNum(r[attach]),"pct")}`,width:clamp((toNum(r[attach])||0)/4.3*100),alert:(toNum(r[attach])||0)<3.9})),"red"),"shopping-basket")+
      cockpitCard("Member Base Touched",inr(rows.reduce((a,r)=>a+(toNum(r[members])||0),0)),barRows(rows.map(r=>({label:r[theatre],value:inr(toNum(r[members])||0),width:clamp((toNum(r[members])||0)/(Math.max(...rows.map(x=>toNum(x[members])||0),1))*100)}))),"users")+
      cockpitCard("Copy Playbook",esc(best?.[theatre]||"–"),`<div class="text-sm text-nia-mute leading-relaxed">Wellington is already above the attach hurdle. Turn its check-in script into the default bundle motion across Rajputana and Deccan.</div>`,"copy-check");
    return;
  }
  if(tab==="Essentials Pilot"){
    const dayCol=readCol(d,["Day"]);const phaseCol=readCol(d,["Phase"]);const penetCol=readCol(d,["Penetration %"]);const cumGmvCol=readCol(d,["Cum GMV (₹)"]);const contrCol=readCol(d,["Contribution (₹)"]);const delivCol=readCol(d,["Delivery Success %"]);const savedCol=readCol(d,["₹ Saved/Member"]);const statusCol=readCol(d,["Status"]);
    const actual=rows.filter(r=>String(r[statusCol]).toLowerCase()==="actual");const latest=actual.length>0?actual[actual.length-1]:null;
    const latestDay=latest?(toNum(latest[dayCol])||0):0;const cumGmv=latest?(toNum(latest[cumGmvCol])||0):0;const penetration=latest?(toNum(latest[penetCol])||0):0;const delivery=latest?(toNum(latest[delivCol])||0):0;const saved=latest?(toNum(latest[savedCol])||0):0;const contribution=latest?(toNum(latest[contrCol])||0):0;
    host.innerHTML=
      cockpitCard("Day "+latestDay+" · Live Signal",penetration+"% penetration",barRows([{label:"Penetration %",value:penetration+"%",width:clamp(penetration/12*100),alert:penetration<5},{label:"Delivery Success",value:delivery+"%",width:clamp(delivery),alert:delivery<95},{label:"Cum GMV",value:"₹"+inr(cumGmv),width:clamp(cumGmv/50000*100)},{label:"₹ Saved/Member",value:"₹"+inr(saved),width:clamp(saved/100*100)}],"blue"),"flask-conical")+
      cockpitCard("Contribution Trend",contribution>=0?"₹"+inr(contribution)+" positive":"₹"+inr(Math.abs(contribution))+" below zero",'<div class="text-sm text-nia-mute leading-relaxed mb-2">Contribution turns positive only as order density rises and cost/order falls.</div><div class="text-sm font-semibold">Day '+latestDay+' contribution: ₹'+inr(contribution)+'</div>',"trending-up")+
      cockpitCard("Pilot Progress",actual.length+" of 30 days actual",barRows([{label:"Days with actual data",value:actual.length+"/30",width:clamp(actual.length/30*100)},{label:"Days remaining",value:(30-actual.length)+" left",width:clamp((30-actual.length)/30*100),alert:(30-actual.length)<5},{label:"Current phase",value:latest?String(latest[phaseCol]):"Not started",width:50}],"blue"),"calendar-check");
    return;
  }

  host.innerHTML="";
}

function renderTable(){
  const d=state.data[state.active]||{headers:[],rows:[]};
  const host=document.getElementById("tableHost");
  if(!d.headers.length){ host.innerHTML=`<div class="p-16 text-center text-nia-mute flex flex-col items-center gap-3"><i data-lucide="database" class="w-8 h-8 opacity-50"></i> <span class="font-medium">No data in this tab yet.</span></div>`; return; }
  let rows=sortedRows(d).filter(r=>r.some(v=>{const n=toNum(v);return(n!=null&&n!==0)||(n==null&&String(v??"").trim()!=="");})).filter(r=>!r.some(v=>String(v??"").toLowerCase().includes("oragadam")));
  const numCols=d.headers.map((_,ci)=>d.rows.length&&d.rows.filter(r=>toNum(r[ci])!=null).length>d.rows.length*0.6);
  host.innerHTML=renderRecordCards(d, rows, numCols);
  updateDetailNote(rows.length);
}

function updateDetailNote(count){
  const activeTabLabel = CONFIG.tabs[state.active].label;
  document.getElementById("panelTitle").innerHTML = `${activeTabLabel} <span class="text-sm font-medium text-nia-mute bg-nia-wash px-2 py-0.5 rounded-full ml-2 border border-nia-hair">${count} records</span>`;
  const TAB_NOTES = {
    "Priorities": "Use this as the daily management layer: each red priority needs an owner, next action, and tomorrow check. Progress % and rates are derived live from the sheet columns.",
    "DOR": "Daily Ops Review: output metrics stay visible, but the review is driven by controllable input metrics, six-point trends, owners, and actions.",
    "Exceptions": "Exception queue for misses that need action now. Each item has owner, due date, ask rate, driver, and next action.",
    "404s": "404s are recurring operating errors that need a root cause and permanent fix.",
    "CM Actions": "Gap-fill tracker. Achievement below 60% should trigger daily review until the target close date.",
    "Studios": "Active studio view. Wellington is the fill priority; Deccan and Rajputana need CM leakage control.",
    "Drag Scores": "Composite entity score across 15-day CM, net movement, collection due, and occupancy gap.",
    "Enterprise": "Enterprise combines the B2B 500-nest CM miss with the Flow account base.",
    "FONO": "FONO funnel. Visited is not progress unless it converts to contracting or live nests.",
    "FONO Ease": "Ease scores from the FONO easiest-900 model artifact.",
    "Collections": "Collection score uses Studio_Summary dues plus last-15-day member-fee pace from reconciliation.",
    "Movement": "Last-15-day check-in/check-out view. Negative net movement means demand generation is leaking.",
    "Studio Trends": "Last-15-day studio economics. Low trend score should force fill, collect, renegotiate, or exit action.",
    "Essentials": "Wallet attach from the Essentials tracker. Target implied by ₹2.5L on ₹64.2L revenue is roughly 3.9%.",
    "Essentials Pilot": "30-day Essentials pilot tracker. Key signals: penetration %, delivery success %, contribution turning positive."
  };
  const note = document.getElementById("tabnote");
  if(note) note.textContent = TAB_NOTES[activeTabLabel] || "Data synced securely from operational sheets.";
}

function renderMeta(){
  const d=state.data[state.active]; const meta=document.getElementById("tabmeta"); meta.innerHTML="";
  if(!d) return;
  const t=d.fetchedAt?d.fetchedAt.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):"–";
  let pillHtml='';
  if(d.status==="live") pillHtml=`<span class="flex items-center gap-1.5 text-xs font-semibold text-nia-blue bg-nia-panel border border-nia-hair px-2 py-1 rounded-sm"><i data-lucide="check-circle-2" class="w-3.5 h-3.5"></i> Live: ${t}</span>`;
  else if(d.status==="sample") pillHtml=`<span class="flex items-center gap-1.5 text-xs font-semibold text-nia-bluedeep bg-nia-panel border border-nia-hair px-2 py-1 rounded-sm"><i data-lucide="test-tube-2" class="w-3.5 h-3.5"></i> Demo Mode</span>`;
  else pillHtml=`<span class="flex items-center gap-1.5 text-xs font-semibold text-[#7F2F2D] bg-[#F8ECEB] border border-[#E8C8C6] px-2 py-1 rounded-sm"><i data-lucide="x-circle" class="w-3.5 h-3.5"></i> Fetch failed</span>`;
  meta.innerHTML=pillHtml;
}

function renderBanner(){
  const b=document.getElementById("banner");
  if(usingSample){
    b.innerHTML=`<div class="bg-white text-nia-body rounded-lg p-4 flex items-start sm:items-center gap-4 shadow-subtle border border-nia-hair border-l-4 border-l-nia-blue">
      <div class="bg-nia-panel p-2 rounded-sm shrink-0"><i data-lucide="info" class="w-5 h-5 text-nia-blue"></i></div>
      <div class="text-sm font-medium leading-relaxed">
        <span class="font-bold text-nia-blue tracking-wide">PREVIEW MODE</span> <span class="text-nia-mute mx-1">|</span>
        Displaying the embedded 18 June dataset. The Behavior War Room cards are now fully live — <strong>Progress, Current, Target, Gap, Risk and Insight columns are all parsed at render-time from the sheet data</strong>. Replace <code>CONFIG.sheetId</code> with the real sheet ID to go live.
      </div>
    </div>`;
  } else { b.innerHTML=""; }
}

function render(){
  renderBanner();
  renderBehaviorBoard();
  renderSummary();
  renderTabs();
  renderMeta();
  renderCockpit();
  renderTable();
  refreshIcons();
  const anyErr=Object.values(state.data).some(d=>d&&d.status==="error");
  if(usingSample) setStatus("loading","Preview · Sample");
  else if(anyErr) setStatus("error","Sync Error");
  else setStatus("live","Live");
}

/* countdown + refresh */
let remaining=CONFIG.refreshSeconds;
function resetCountdown(){ remaining=CONFIG.refreshSeconds; }
function tick(){
  remaining--;
  const m=Math.floor(remaining/60), s=String(remaining%60).padStart(2,"0");
  document.getElementById("countdown").textContent= usingSample?"":"Next sync in "+m+":"+s;
  if(remaining<=0 && !usingSample) loadAll();
}

document.getElementById("refreshBtn").onclick=()=>loadAll();
loadAll();
if(!usingSample){ setInterval(tick,1000); } else { tick(); }
</script>
</body>
